services:
  db:
    image: postgres:17.4-alpine
    restart: always
    ports:
      - 5437:5432
    environment:
      POSTGRES_DB: revisium-endpoint-test
      POSTGRES_USER: revisium
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s
