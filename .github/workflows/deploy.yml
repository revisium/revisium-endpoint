name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Build']
    types:
      - completed
    branches:
      - master

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write
    uses: revisium/revisium-actions/.github/workflows/deploy.yml@763f2746000f15842e642130dba3acf09c5d00ac # v0.3.2
    with:
      ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      environment: development
      deployment_description: Deploy to Kubernetes
      kube_namespace: ${{ vars.KUBE_NAMESPACE }}
      kube_service_name: ${{ vars.KUBE_SERVICE_NAME }}
      kube_app_url: ${{ vars.KUBE_APP_URL }}
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
