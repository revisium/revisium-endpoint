# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Server CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Create test .env
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a #canastro/copy-file-action@master
        with:
          source: '.env.example'
          target: '.env'

      - run: npm ci

      - run: npm run test:cov

      - run: npm run lint:ci

      - run: npm run tsc

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@8c71dc039c2dd71d3821e89a2b58ecc7fee6ced9 #SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 #codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: revisium/revisium-endpoint

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17.4-alpine
        env:
          POSTGRES_DB: revisium-endpoint-test
          POSTGRES_USER: revisium
          POSTGRES_PASSWORD: password
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U revisium"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'

      - run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://revisium:password@localhost:5437/revisium-endpoint-test?schema=public
          REVISIUM_NO_AUTH: 'true'
          PORT: 8082
          CORE_API_URL: http://127.0.0.1:8082
