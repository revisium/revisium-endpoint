# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Server CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Create test .env
        uses: canastro/copy-file-action@7ddff6fc153a2ea2cd0fb88ed9750544c051e399 # 0.0.2
        with:
          source: '.env.example'
          target: '.env'

      - run: npm ci

      - run: npm run test:cov

      - run: npm run lint:ci

      - run: npm run tsc

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: revisium/revisium-endpoint

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17.4-alpine
        env:
          POSTGRES_DB: revisium-endpoint-test
          POSTGRES_USER: revisium
          POSTGRES_PASSWORD: password
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U revisium"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'npm'

      - run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://revisium:password@localhost:5437/revisium-endpoint-test?schema=public
          REVISIUM_NO_AUTH: 'true'
          PORT: 8082
          CORE_API_URL: http://127.0.0.1:8082
