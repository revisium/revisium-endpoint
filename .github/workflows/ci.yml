name: Server CI

on:
  push:
    branches: [master, 'release/**']
  pull_request:
    branches: [master, 'release/**']

permissions:
  contents: read

jobs:
  checks:
    uses: revisium/revisium-actions/.github/workflows/node-build.yml@763f2746000f15842e642130dba3acf09c5d00ac # v0.3.2
    with:
      node_version: 24.11.1
      install_command: npm ci
      run_commands: |
        cp .env.example .env
        npm run test:cov
        npm run lint:ci
        npm run tsc

  sonar:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: npm

      - name: Create test .env
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage
        run: npm run test:cov

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e:
    uses: revisium/revisium-actions/.github/workflows/node-build.yml@763f2746000f15842e642130dba3acf09c5d00ac # v0.3.2
    with:
      node_version: 24.11.1
      install_command: npm ci
      run_commands: |
        npm run test:e2e:up
        DATABASE_URL='postgresql://revisium:password@localhost:5437/revisium-endpoint-test?schema=public' REVISIUM_NO_AUTH='true' PORT=8082 CORE_API_URL='http://127.0.0.1:8082' npm run test:e2e
        npm run test:e2e:down
